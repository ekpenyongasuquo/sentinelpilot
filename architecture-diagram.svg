  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" fill="#e8eaf0" font-size="18" font-weight="bold" letter-spacing="3">SENTINELPILOT — ARCHITECTURE</text>
  <text x="450" y="54" text-anchor="middle" fill="#4b5563" font-size="10" letter-spacing="2">SPLUNK AGENTIC OPS HACKATHON 2026 · SECURITY TRACK</text>
