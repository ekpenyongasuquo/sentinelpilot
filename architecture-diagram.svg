    <line x1="0" y1="174" x2="900" y2="174"/>
    <line x1="0" y1="232" x2="900" y2="232"/>
    <line x1="0" y1="290" x2="900" y2="290"/>
    <line x1="0" y1="348" x2="900" y2="348"/>
    <line x1="0" y1="406" x2="900" y2="406"/>
    <line x1="0" y1="464" x2="900" y2="464"/>
    <line x1="0" y1="522" x2="900" y2="522"/>
    <line x1="150" y1="0" x2="150" y2="580"/>
    <line x1="300" y1="0" x2="300" y2="580"/>
    <line x1="450" y1="0" x2="450" y2="580"/>
    <line x1="600" y1="0" x2="600" y2="580"/>
