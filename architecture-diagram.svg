  <text x="450" y="262" text-anchor="middle" fill="#00d4ff" font-size="9" letter-spacing="2">ANTHROPIC</text>
  <text x="450" y="280" text-anchor="middle" fill="#e8eaf0" font-size="13" font-weight="bold">Claude AI</text>
