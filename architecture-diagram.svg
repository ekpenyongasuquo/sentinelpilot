  <text x="565" y="534" fill="#6b7280" font-size="10">Optional Integration</text>

  <text x="450" y="552" text-anchor="middle" fill="#4b5563" font-size="9" letter-spacing="1">SENTINELPILOT v1.0 · EKPENYONG ASUQUO · SPLUNK AGENTIC OPS HACKATHON 2026</text>
