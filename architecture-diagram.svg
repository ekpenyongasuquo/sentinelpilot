  <text x="130" y="104" text-anchor="middle" fill="#6b7280" font-size="9" letter-spacing="2">LAYER 1</text>
  <text x="130" y="122" text-anchor="middle" fill="#e8eaf0" font-size="13" font-weight="bold">React Dashboard</text>
